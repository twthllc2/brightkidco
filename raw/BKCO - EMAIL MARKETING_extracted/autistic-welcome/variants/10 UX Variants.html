<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Email 1 · 10 UX Variants · BrightKidCo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Questrial&family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #EFEAE1; font-family: 'Questrial', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script src="content.js"></script>
<script src="tokens.js"></script>
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel" src="variants-1-3.jsx"></script>
<script type="text/babel" src="variants-4-6.jsx"></script>
<script type="text/babel" src="variants-7-10.jsx"></script>

<script type="text/babel">
  const variants = [
    { id: "v1",  label: "V1 · Storybook",            C: V1_Storybook,     h: 2580, desc: "Illustrative, paper feel, yellow accents, kid-brand warmth" },
    { id: "v2",  label: "V2 · Editorial Magazine",   C: V2_Editorial,     h: 2580, desc: "Serif drop-cap, newspaper dek, premium editorial" },
    { id: "v3",  label: "V3 · Playful Cards",        C: V3_PlayfulCards,  h: 2680, desc: "Polaroids, stickers, slight rotations, expressive" },
    { id: "v4",  label: "V4 · Soft Minimal",         C: V4_SoftMinimal,   h: 2400, desc: "White canvas, gradient headlines, generous whitespace" },
    { id: "v5",  label: "V5 · Warm Beige",           C: V5_WarmBeige,     h: 2480, desc: "Neutral beige, italic serif accents, adult calm" },
    { id: "v6",  label: "V6 · Playful Duotone",      C: V6_Duotone,       h: 2520, desc: "Bold color blocks, Surreal-inspired, alternating backgrounds" },
    { id: "v7",  label: "V7 · Conversational Chat",  C: V7_Chat,          h: 2300, desc: "iMessage-style bubbles, conversational pace" },
    { id: "v8",  label: "V8 · Scrapbook / Journal",  C: V8_Scrapbook,     h: 2700, desc: "Handwritten Caveat font, tape, tilted cards, intimate" },
    { id: "v9",  label: "V9 · Clinical Premium",     C: V9_Clinical,      h: 2480, desc: "BREZ-like, soft medical, trust-building, modular" },
    { id: "v10", label: "V10 · Bold Monochrome",     C: V10_BoldMono,     h: 2880, desc: "Dark mode, huge type, gradient accents, statement-like" },
  ];

  const App = () => (
    <DesignCanvas title="Email 1 · 10 UX Variants" subtitle="Autistic Parent · Welcome Flow · Mobile 420px">
      <DCSection id="intro" title="Brief">
        <DCArtboard id="brief" label="How to read these" width={520} height={640} background="#FFFFFF">
          <div style={{ padding: 40, fontFamily: "'Questrial', sans-serif", color: "#1F2D2F", lineHeight: 1.6 }}>
            <div style={{ display: "inline-block", padding: "6px 12px", background: "#E8F5EC", color: "#2BAEB4", borderRadius: 999, fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, marginBottom: 18 }}>
              10 UX directions · same copy
            </div>
            <h1 style={{ fontSize: 30, margin: "0 0 14px", fontWeight: 700, letterSpacing: -0.5, lineHeight: 1.1 }}>
              From <span style={{ background: "linear-gradient(135deg, #2BAEB4, #5DD07A)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>verspielt</span> bis minimal.
            </h1>
            <p style={{ fontSize: 14, margin: "0 0 18px", color: "#566668" }}>
              All 10 variants use the same copy (research-based) and same content structure. What changes is the UX: layout, typography system, color treatment, voice.
            </p>
            <div style={{ display: "grid", gap: 10, fontSize: 13.5 }}>
              <div><strong>Main font:</strong> Questrial (geometric, rounded, matches logo)</div>
              <div><strong>Display accent:</strong> Fraunces (used in 4 variants)</div>
              <div><strong>Handwritten accent:</strong> Caveat (V8 only)</div>
              <div><strong>Brand gradient:</strong> teal → green (logo colors)</div>
              <div><strong>Viewport:</strong> 420px (mobile-optimized)</div>
              <div><strong>Klaviyo export:</strong> Step 2 — once you pick variants</div>
            </div>
            <div style={{ marginTop: 22, padding: 14, background: "#FEF9EC", borderRadius: 10, fontSize: 12.5, color: "#8B7A52" }}>
              💡 <strong>Tip:</strong> Click any artboard's focus icon to see it fullscreen. Reorder by dragging. Tell me which 1-3 you like and I'll build Klaviyo-ready table HTML.
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="playful" title="Verspielt / Expressiv">
        {variants.slice(0,3).map(v => (
          <DCArtboard key={v.id} id={v.id} label={v.label} width={420} height={v.h} background="#FFFFFF">
            <v.C />
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="mix" title="Mix · Warm, bold, conversational">
        {variants.slice(3,7).map(v => (
          <DCArtboard key={v.id} id={v.id} label={v.label} width={420} height={v.h} background="#FFFFFF">
            <v.C />
          </DCArtboard>
        ))}
      </DCSection>

      <DCSection id="premium" title="Minimal / Hochwertig / Statement">
        {variants.slice(7,10).map(v => (
          <DCArtboard key={v.id} id={v.id} label={v.label} width={420} height={v.h} background="#FFFFFF">
            <v.C />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
