    const Header = ({ bg }) => (

        <img src={{LOGO}} alt="BrightKidCo" style={{ height: 34 }} />
      </div>
    );

  Resolved values used here reflect the FIRST email (Flow 1 / Email 1),
  which calls <Header bg={{B.paper}} /> -- i.e. white background.
  On other emails the bg prop may be B.ink (#1F2D2F), B.cream (#FBF7F1),
  or any solid color the section above it requires.

  Image source: BASE64-INLINED PNG (uuid 385063b8-..., registered as
  window.__resources.logoV2 in the standalone build). Original file:
  assets/brightkidco-logo-v2.png (relative to email-design-environment/).

  filesystem dependency on ../assets/... - which is required when this
  snippet is dropped into other contexts (review canvas, ticket
  attachments, design QA, etc.).
-->
