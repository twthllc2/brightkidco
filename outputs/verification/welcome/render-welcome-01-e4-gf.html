<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=420, initial-scale=1" />
  <title>Welcome E4 GF — Render</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Fraunces:ital,wght@0,400;0,700;1,400;1,500&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F0F0F0; display: flex; justify-content: center; padding: 20px; }
    #root { width: 420px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // ═══ Brand Tokens ═══
    window.BRAND = {
      teal: "#2BAEB4",
      tealDeep: "#1E8A8F",
      green: "#5DD07A",
      greenDeep: "#3BB35E",
      ink: "#1F2D2F",
      soft: "#4A6568",
      muted: "#8A9B9D",
      cream: "#FBF7F1",
      paper: "#FFFFFF",
      gradient: "linear-gradient(135deg, #2BAEB4 0%, #5DD07A 100%)",
      gradientText: {
        background: "linear-gradient(135deg, #2BAEB4 0%, #5DD07A 100%)",
        WebkitBackgroundClip: "text",
        WebkitTextFillColor: "transparent",
        backgroundClip: "text",
        color: "transparent",
      },
    };

    window.FONT = {
      main: "'Questrial', system-ui, sans-serif",
      display: "'Fraunces', Georgia, serif",
    };

    window.FLOW1_SHARED = {
      signoff: {
        line1: "With you,",
        name: "Lena Bauer",
        ps: "P.S. If you ever want to reply and tell me about your child — I read every one. Really.",
      },
      out: "You can pause this series anytime. Come back when you're ready.",
      footer: {
        tagline: "Calm progress, one day at a time.",
        links: ["Our Method", "Shop the Pants", "Parent Stories"],
        address: "BrightKidCo Ltd · Berlin, Germany · hello@brightkidco.com",
      },
    };

    // ═══ Primitives ═══
    const MW = 420;
    const LOGO = "https://raw.githubusercontent.com/nicekid1/brightkidco/main/raw/assets/brightkidco-logo-v2.png";
    const B = window.BRAND;
    const F = window.FONT;

    const ImgFrame = ({ height = 200, label, sublabel, radius = 20, aspect }) => (
      <div style={{
        position: "relative", width: "100%", height: aspect ? undefined : height,
        aspectRatio: aspect, background: "#FFFFFF", border: `2px dashed ${B.teal}`,
        borderRadius: radius, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", padding: "18px 22px",
        textAlign: "center", overflow: "hidden",
      }}>
        <svg width="14" height="14" style={{ position: "absolute", top: 10, left: 10 }} viewBox="0 0 14 14"><path d="M1,6 L1,1 L6,1" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="14" height="14" style={{ position: "absolute", top: 10, right: 10 }} viewBox="0 0 14 14"><path d="M8,1 L13,1 L13,6" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="14" height="14" style={{ position: "absolute", bottom: 10, left: 10 }} viewBox="0 0 14 14"><path d="M1,8 L1,13 L6,13" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="14" height="14" style={{ position: "absolute", bottom: 10, right: 10 }} viewBox="0 0 14 14"><path d="M8,13 L13,13 L13,8" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="32" height="32" viewBox="0 0 32 32" style={{ marginBottom: 10, opacity: 0.5 }}>
          <rect x="3" y="6" width="26" height="20" rx="3" stroke={B.teal} strokeWidth="1.8" fill="none" />
          <circle cx="11" cy="13" r="2.5" fill={B.teal} opacity="0.5" />
          <path d="M5,23 L12,16 L18,21 L22,18 L27,23" stroke={B.teal} strokeWidth="1.8" fill="none" strokeLinejoin="round" />
        </svg>
        <div style={{ fontFamily: F.main, fontSize: 12.5, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: B.teal, marginBottom: 6 }}>{label}</div>
        <div style={{ fontFamily: F.main, fontSize: 12, lineHeight: 1.5, color: B.soft, maxWidth: 300 }}>{sublabel}</div>
      </div>
    );

    const FramedImage = ({ children, height, label, sublabel, shadow = 4 }) => (
      <div style={{ borderRadius: 20, overflow: "hidden", border: `2px solid ${B.ink}`, boxShadow: `${shadow}px ${shadow}px 0 ${B.ink}` }}>
        <ImgFrame height={height} radius={0} label={label} sublabel={sublabel} />
        {children}
      </div>
    );

    const Band = ({ from, to, height = 40 }) => (
      <div style={{ height, background: `linear-gradient(180deg, ${from} 0%, ${to} 100%)` }} />
    );

    const Header = ({ bg }) => (
      <div style={{ background: bg, padding: "24px 20px 0", textAlign: "center" }}>
        <img src={LOGO} alt="BrightKidCo" style={{ height: 34 }} />
      </div>
    );

    const PartBadge = ({ children }) => (
      <div style={{
        display: "inline-block", background: "#FFD866",
        padding: "7px 14px", borderRadius: 999, fontSize: 10.5,
        fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase",
        marginBottom: 16, border: `2px solid ${B.ink}`, transform: "rotate(-1.5deg)",
        whiteSpace: "nowrap", lineHeight: 1.4,
      }}>{children}</div>
    );

    const TitleBlock = ({ badge, part1, part2, accent2 = true, subhead }) => (
      <div style={{ padding: "34px 22px 0", textAlign: "center" }}>
        <PartBadge>{badge}</PartBadge>
        <h1 style={{ fontSize: 40, lineHeight: 1, fontWeight: 700, margin: 0, letterSpacing: -0.8 }}>
          {part1}<br/>
          {accent2 ? <span style={{ ...B.gradientText, fontWeight: 700 }}>{part2}</span> : part2}
        </h1>
        {subhead && (
          <p style={{ fontSize: 17, color: B.soft, marginTop: 14, lineHeight: 1.4, fontWeight: 500 }}>{subhead}</p>
        )}
      </div>
    );

    const Letter = ({ bg, paras, first }) => (
      <div style={{ background: bg, padding: "4px 24px 28px", fontSize: 15, lineHeight: 1.7, color: B.soft }}>
        {first && <p style={{ margin: "0 0 14px", fontSize: 17, color: B.ink, fontWeight: 600 }}>{first}</p>}
        {paras.map((p, i) => (
          <p key={i} style={{ margin: i === paras.length - 1 ? 0 : "0 0 14px" }}>{p}</p>
        ))}
      </div>
    );

    const Eyebrow = ({ children, color = B.tealDeep }) => (
      <div style={{ fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color, fontWeight: 700, marginBottom: 10 }}>{children}</div>
    );

    const H2 = ({ children, center, size = 28 }) => (
      <h2 style={{ fontSize: size, lineHeight: 1.15, fontWeight: 700, margin: "0 0 16px", letterSpacing: -0.4, textAlign: center ? "center" : "left" }}>{children}</h2>
    );

    const CTAClose = ({ intro, button, fine, bg = B.ink }) => (
      <div style={{ background: bg, padding: "20px 22px 44px", textAlign: "center", color: "#FFF" }}>
        <p style={{ fontSize: 14, lineHeight: 1.6, color: "#B8CACD", margin: "0 0 24px" }}>{intro}</p>
        <a href="#" style={{
          display: "inline-block", padding: "17px 32px",
          background: "#D8F57C", color: B.ink, fontSize: 15.5, fontWeight: 700,
          textDecoration: "none", borderRadius: 999, letterSpacing: 0.3,
        }}>{button} →</a>
        {fine && <div style={{ marginTop: 16, fontSize: 11.5, color: "#8A9B9D" }}>{fine}</div>}
      </div>
    );

    const Signoff = ({ bg = B.ink }) => {
      const s = window.FLOW1_SHARED.signoff;
      return (
        <div style={{ background: bg, padding: "0 22px 36px" }}>
          <div style={{
            position: "relative",
            background: "#1F2A2C",
            border: "1.5px solid #2F3D40",
            borderRadius: 22,
            padding: "26px 24px 24px",
            overflow: "hidden",
          }}>
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0, height: 4,
              background: B.gradient, opacity: 0.9,
            }} />
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
              <div style={{
                width: 58, height: 58, flexShrink: 0,
                borderRadius: "50%",
                background: `linear-gradient(135deg, #FFD866 0%, ${B.teal} 100%)`,
                padding: 2.5,
                position: "relative",
              }}>
                <div style={{
                  width: "100%", height: "100%", borderRadius: "50%",
                  background: "#FFFDF6",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  overflow: "hidden",
                  border: `1.5px solid ${B.ink}`,
                }}>
                  <svg width="58" height="58" viewBox="0 0 58 58">
                    <rect width="58" height="58" fill="#F5E8D0" />
                    <circle cx="29" cy="22" r="10" fill="#D4A574" />
                    <path d="M10,58 C10,42 18,34 29,34 C40,34 48,42 48,58 Z" fill="#C98C6B" />
                    <text x="29" y="55" textAnchor="middle" fontSize="6" fill={B.ink} fontWeight="700" letterSpacing="0.5" opacity="0.4">PHOTO</text>
                  </svg>
                </div>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: 10.5, letterSpacing: 1.6, textTransform: "uppercase",
                  color: "#8FAFB2", fontWeight: 700, marginBottom: 2,
                }}>A note from</div>
                <div style={{ fontSize: 17, fontWeight: 700, color: "#FFFFFF", lineHeight: 1.2 }}>
                  Lena Bauer
                </div>
                <div style={{ fontSize: 12, color: "#8FAFB2", marginTop: 2, fontStyle: "italic" }}>
                  Founder · BrightKidCo · Mom of two
                </div>
              </div>
            </div>
            <div style={{
              display: "flex", alignItems: "center", gap: 14,
              paddingTop: 16, paddingBottom: 16,
              borderTop: "1.5px dashed #3A4547",
              borderBottom: "1.5px dashed #3A4547",
              marginBottom: 16,
            }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12.5, color: "#B8CACD", marginBottom: 2 }}>
                  {s.line1}
                </div>
                <div style={{
                  fontFamily: "'Caveat', cursive",
                  fontSize: 42,
                  lineHeight: 0.95,
                  fontWeight: 500,
                  color: "#D8F57C",
                  letterSpacing: -0.5,
                  marginTop: 2,
                }}>Lena</div>
              </div>
              <svg width="54" height="40" viewBox="0 0 54 40" style={{ flexShrink: 0, opacity: 0.55 }}>
                <path d="M2,20 C8,10 16,28 24,18 C30,10 38,26 48,14 L52,10" stroke="#D8F57C" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                <path d="M48,12 L52,10 L50,14" stroke="#D8F57C" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </div>
            <div style={{
              fontSize: 13, lineHeight: 1.65, color: "#B8CACD",
              fontStyle: "italic",
            }}>
              <span style={{ color: "#D8F57C", fontWeight: 700, fontStyle: "normal", marginRight: 4 }}>
                P.S.
              </span>
              {s.ps.replace(/^P\.S\.\s*/, "")}
            </div>
          </div>
        </div>
      );
    };

    const OutLine = ({ bg = "#FFFFFF" }) => (
      <div style={{ background: bg, padding: "18px 24px 0", textAlign: "center", fontSize: 12.5, color: B.muted, fontStyle: "italic" }}>
        {window.FLOW1_SHARED.out}
      </div>
    );

    const EmailShell = ({ children, preheader, bg }) => (
      <div style={{ width: MW, background: bg, fontFamily: F.main, color: B.ink }}>
        <div style={{ padding: "6px 20px", fontSize: 11, color: B.muted, background: "#F6F2EA", textAlign: "center", fontStyle: "italic" }}>
          Preheader: {preheader}
        </div>
        {children}
      </div>
    );

    // ═══ Email: Welcome E4 GF ═══
    const Email_Welcome_E4_GF = () => {
      const hr = (
        <div style={{ display: "flex", justifyContent: "center", padding: "8px 0" }}>
          <div style={{ width: 80, height: 1, background: "#E3DCD2" }} />
        </div>
      );

      return (
        <EmailShell
          preheader="Whether your child is 3 or 10, verbal or non-verbal, diagnosed or still figuring it out, these three families all found the same thing."
          bg="#FAF8F5"
        >
          {/* ── Header ── */}
          <Header bg="#FAF8F5" />

          {/* ══════ HERO: Story Fragment ══════ */}
          <div style={{ background: "#F5EDE3" }}>
            <img
              src="/root/projects/brightkidco/raw/product-photos/lifestyle/toddler-livingroom-dino-yellow.png"
              alt="A happy toddler playing in a warm living room wearing BrightKidCo training pants"
              style={{ width: "100%", height: 340, objectFit: "cover", display: "block" }}
              onError={(e) => { e.target.style.display = "none"; e.target.parentElement.style.height = "340px"; e.target.parentElement.style.background = "#F5EDE3"; }}
            />
            <div style={{ padding: "20px 32px 24px", textAlign: "center" }}>
              <div style={{
                fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase",
                color: B.muted, fontWeight: 700, marginBottom: 10,
              }}>THREE FAMILIES</div>
              <h1 style={{
                fontFamily: "'Georgia', 'Times New Roman', serif",
                fontSize: 28, fontWeight: 700, letterSpacing: -0.5, lineHeight: 1.2,
                color: B.ink, margin: 0,
              }}>Three kids, three stories,<br/>one thing in common</h1>
            </div>
          </div>

          {hr}

          {/* ══════ HOOK: Double Column ══════ */}
          <div style={{ background: "#FFFFFF", padding: "24px 24px" }}>
            <table width="100%" cellPadding="0" cellSpacing="0" border="0" style={{ borderCollapse: "collapse" }}>
              <tbody>
                <tr>
                  <td style={{ width: "50%", paddingRight: 10, verticalAlign: "top" }}>
                    <p style={{
                      fontSize: 16, lineHeight: 1.6, color: "#3D3D3D",
                      margin: 0, fontFamily: F.main,
                    }}>Whether your child is just starting to show signs, or you're years into what feels like every possible method, if they don't feel when they need to go, you've been fighting the wrong battle.</p>
                  </td>
                  <td style={{ width: "50%", paddingLeft: 10, verticalAlign: "top" }}>
                    <p style={{
                      fontFamily: "'Georgia', 'Times New Roman', serif",
                      fontSize: 18, fontStyle: "italic", lineHeight: 1.5,
                      color: B.ink, margin: 0,
                    }}>I hear from parents every day who are exhausted, out of ideas, and wondering if this will ever click. Let me introduce you to three families. Three different kids. Three completely different stories. One thing in common.</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          {hr}

          {/* ══════ VALIDATION: Letter + Pull-Quotes + Stat ══════ */}
          <div style={{ background: "#FBF7F1", padding: "32px 24px" }}>
            <p style={{
              fontSize: 16, lineHeight: 1.6, color: "#3D3D3D",
              margin: "0 0 24px", fontFamily: F.main,
            }}>If you've ever thought any of these things, you're not alone. You haven't failed. You've been working with advice that wasn't built for your child's nervous system.</p>

            {/* Quote 1 */}
            <div style={{
              background: "#FFFFFF", borderRadius: 16, padding: "20px 24px",
              border: "1px solid #E3DCD2", marginBottom: 16,
            }}>
              <p style={{
                fontFamily: "'Georgia', 'Times New Roman', serif",
                fontSize: 16, fontStyle: "italic", lineHeight: 1.5,
                color: B.ink, margin: "0 0 8px",
              }}>"I feel like we have tried everything, reward systems, punishments and nothing seems to work."</p>
              <p style={{ fontSize: 12, color: B.muted, margin: 0 }}>— Real parent, Autistic-LanguageBank-full.txt (line 90-91)</p>
            </div>

            {/* Quote 2 */}
            <div style={{
              background: "#FFFFFF", borderRadius: 16, padding: "20px 24px",
              border: "1px solid #E3DCD2", marginBottom: 16,
            }}>
              <p style={{
                fontFamily: "'Georgia', 'Times New Roman', serif",
                fontSize: 16, fontStyle: "italic", lineHeight: 1.5,
                color: B.ink, margin: "0 0 8px",
              }}>"I feel like a failure because he's still in pull ups."</p>
              <p style={{ fontSize: 12, color: B.muted, margin: 0 }}>— Real parent, Autistic-1-full.txt (line 2222-2223)</p>
            </div>

            {/* Stat Callout — Muted Sage */}
            <div style={{
              background: "#C8D5C0", borderRadius: 4, padding: 20,
              marginBottom: 16,
            }}>
              <p style={{
                fontSize: 16, lineHeight: 1.6, color: B.ink,
                margin: 0, fontFamily: F.main,
              }}>Nearly half of autistic 4-5 year olds, <strong>49%</strong>, are still not toilet trained (Wiggins et al. 2022, CDC-funded study of 743 children). That's compared to just 8% of typically developing children the same age.</p>
            </div>

            <p style={{
              fontSize: 16, lineHeight: 1.6, color: "#3D3D3D",
              margin: 0, fontFamily: F.main,
            }}>That statistic doesn't mean something is wrong with your child. It means what you're going through is documented, measurable, and far more common than you think.</p>
          </div>

          {hr}

          {/* ══════ MECHANISM: Comparison Matrix ══════ */}
          <div style={{ background: "#FFFFFF", padding: "32px 24px" }}>
            <p style={{
              fontSize: 16, lineHeight: 1.6, color: "#3D3D3D",
              margin: "0 0 20px", fontFamily: F.main,
            }}>Here's what all three families have in common: their children weren't getting the body signal.</p>

            {/* Pull-ups vs BKC Signal — side-by-side */}
            <table width="100%" cellPadding="0" cellSpacing="0" border="0" style={{ borderCollapse: "collapse", marginBottom: 20 }}>
              <tbody>
                <tr>
                  <td style={{ width: "50%", paddingRight: 8, verticalAlign: "top" }}>
                    <div style={{
                      background: "#FAF7F0", border: "1.5px solid #E3DCD2",
                      borderRadius: 12, padding: "16px 14px",
                    }}>
                      <div style={{
                        fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase",
                        color: B.muted, fontWeight: 700, marginBottom: 6,
                      }}>Pull-ups</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: B.ink, lineHeight: 1.3 }}>"Too dry to learn"</div>
                    </div>
                  </td>
                  <td style={{ width: "50%", paddingLeft: 8, verticalAlign: "top" }}>
                    <div style={{
                      background: "#FFFFFF", border: `2px solid ${B.teal}`,
                      borderRadius: 12, padding: "16px 14px",
                    }}>
                      <div style={{
                        fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase",
                        color: B.teal, fontWeight: 700, marginBottom: 6,
                      }}>BKC Signal</div>
                      <div style={{ fontSize: 16, fontWeight: 700, color: B.ink, lineHeight: 1.3 }}>"Just right" sensation</div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>

            <p style={{
              fontSize: 16, lineHeight: 1.6, color: "#3D3D3D",
              margin: "0 0 14px", fontFamily: F.main,
            }}>Interoception — the eighth sensory system — is how your brain knows when you're hungry, thirsty, or need the bathroom. For children with sensory processing differences, this signal is delayed, weakened, or absent. Research confirms this is a real, measurable neurological difference.</p>
            <p style={{
              fontSize: 16, lineHeight: 1.6, color: "#3D3D3D",
              margin: 0, fontFamily: F.main,
            }}>The Body-Signal Learning Layer creates that feedback — a gentle sensation that lasts 30-60 seconds after every accident. Enough time for the brain to register: <em>something happened</em>.</p>
          </div>

          {hr}

          {/* ══════ SIGNAL BRIDGE ILLUSTRATION ══════ */}
          <div style={{ background: "#FFFFFF", padding: "16px 24px" }}>
            <ImgFrame
              height={200}
              label="SIGNAL BRIDGE ILLUSTRATION"
              sublabel="Child → Bridge → Brain · Amber to green gradient · Minimal vector illustration in brand line style"
              radius={12}
            />
          </div>

          {hr}

          {/* ══════ THREE-FAMILY TESTIMONIALS ══════ */}
          <div style={{ background: "#FFFFFF", padding: "32px 24px" }}>
            <h2 style={{
              fontSize: 22, lineHeight: 1.3, fontWeight: 700,
              color: B.ink, margin: "0 0 20px", textAlign: "center",
              fontFamily: F.main,
            }}>Three different families. Three different kids. One thing in common.</h2>

            {/* Family 1 — Soft Coral border */}
            <div style={{
              background: "#FFFFFF", border: "1px solid #E3DCD2",
              borderLeft: "4px solid #E8A98F", borderRadius: 16,
              padding: "20px 24px", marginBottom: 16,
            }}>
              <div style={{
                fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase",
                fontWeight: 700, color: B.muted, marginBottom: 10,
              }}>FAMILY 1</div>
              <p style={{
                fontFamily: "'Georgia', 'Times New Roman', serif",
                fontSize: 16, fontStyle: "italic", lineHeight: 1.5,
                color: B.ink, margin: "0 0 10px",
              }}>"My son talks about the potty but won't actually do it. He says 'I need to pee' AFTER it's already happened. We'd been stuck for over a year. After about 3 weeks in these undies, he paused mid-accident. Looked down. Then walked to the potty. That pause, that had never happened before."</p>
              <p style={{ fontSize: 12, color: B.muted, margin: 0 }}>— Parent of a 4-year-old, mostly verbal, mild sensory differences</p>
            </div>

            {/* Family 2 — Gentle Teal border */}
            <div style={{
              background: "#FFFFFF", border: "1px solid #E3DCD2",
              borderLeft: "4px solid #8AB9B5", borderRadius: 16,
              padding: "20px 24px", marginBottom: 16,
            }}>
              <div style={{
                fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase",
                fontWeight: 700, color: B.muted, marginBottom: 10,
              }}>FAMILY 2</div>
              <p style={{
                fontFamily: "'Georgia', 'Times New Roman', serif",
                fontSize: 16, fontStyle: "italic", lineHeight: 1.5,
                color: B.ink, margin: "0 0 10px",
              }}>"We'd tried everything from the BCBA's protocol to OT sensory work to social stories. Scheduled sits for 2 years, he never went on his own. We didn't expect a product to solve it. But the wetness signal in these undies is different, he can actually feel it. After 6 weeks, he initiated once. Once! After 4 years of nothing."</p>
              <p style={{ fontSize: 12, color: B.muted, margin: 0 }}>— Parent of a 6-year-old, mixed verbal, moderate support needs</p>
            </div>

            {/* Family 3 — Pale Gold border */}
            <div style={{
              background: "#FFFFFF", border: "1px solid #E3DCD2",
              borderLeft: "4px solid #D4B886", borderRadius: 16,
              padding: "20px 24px", marginBottom: 16,
            }}>
              <div style={{
                fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase",
                fontWeight: 700, color: B.muted, marginBottom: 10,
              }}>FAMILY 3</div>
              <p style={{
                fontFamily: "'Georgia', 'Times New Roman', serif",
