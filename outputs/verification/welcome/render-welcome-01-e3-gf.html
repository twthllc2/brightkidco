<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=420, initial-scale=1" />
  <title>Welcome E3 GF — Render</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Fraunces:ital,wght@0,400;0,700;1,400;1,500&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet" />
  <script crossorigin src="react.min.js"></script>
  <script crossorigin src="react-dom.min.js"></script>
  <script src="babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F0F0F0; display: flex; justify-content: center; padding: 20px; }
    #root { width: 420px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Brand tokens + primitives + email -->
  <script type="text/babel" data-type="module">
    window.BRAND = {
      teal: "#2BAEB4",
      tealDeep: "#1E8A8F",
      green: "#5DD07A",
      greenDeep: "#3BB35E",
      ink: "#1F2D2F",
      soft: "#4A6568",
      muted: "#8A9B9D",
      cream: "#FBF7F1",
      paper: "#FFFFFF",
      gradient: "linear-gradient(135deg, #2BAEB4 0%, #5DD07A 100%)",
      gradientText: {
        background: "linear-gradient(135deg, #2BAEB4 0%, #5DD07A 100%)",
        WebkitBackgroundClip: "text",
        WebkitTextFillColor: "transparent",
        backgroundClip: "text",
        color: "transparent",
      },
    };

    window.FONT = {
      main: "'Questrial', system-ui, sans-serif",
      display: "'Fraunces', Georgia, serif",
    };

    window.FLOW1_SHARED = {
      signoff: {
        line1: "With understanding,",
        name: "Lena Bauer",
        ps: "I have two autistic sons. One's 6, still working through this. The other took us until he was almost 8. If your kid is anywhere on this curve, whether they talk about it constantly or have never acknowledged being wet, that's normal here. You're not behind. You're not failing. You're exactly where you need to be to find something that actually works differently.",
      },
      out: "You can pause this series anytime. Come back when you're ready.",
      footer: {
        tagline: "BrightKidCo",
        links: ["Shop", "Parent Stories", "Contact us", "FAQ"],
        address: "BrightKidCo Ltd · Berlin, Germany · hello@brightkidco.com",
      },
    };

    const MW = 420;
    const LOGO = "https://raw.githubusercontent.com/nicekid1/brightkidco/main/raw/assets/brightkidco-logo-v2.png";
    const B = window.BRAND;
    const F = window.FONT;

    /* ── Image placeholder (dashed teal frame) ── */
    const ImgFrame = ({ height = 200, label, sublabel, radius = 20, aspect }) => (
      <div style={{
        position: "relative", width: "100%", height: aspect ? undefined : height,
        aspectRatio: aspect, background: "#FFFFFF", border: `2px dashed ${B.teal}`,
        borderRadius: radius, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center", padding: "18px 22px",
        textAlign: "center", overflow: "hidden",
      }}>
        <svg width="14" height="14" style={{ position: "absolute", top: 10, left: 10 }} viewBox="0 0 14 14"><path d="M1,6 L1,1 L6,1" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="14" height="14" style={{ position: "absolute", top: 10, right: 10 }} viewBox="0 0 14 14"><path d="M8,1 L13,1 L13,6" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="14" height="14" style={{ position: "absolute", bottom: 10, left: 10 }} viewBox="0 0 14 14"><path d="M1,8 L1,13 L6,13" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>
        <svg width="14" height="14" style={{ position: "absolute", bottom: 10, right: 10 }} viewBox="0 0 14 14"><path d="M8,13 L13,13 L13,8" stroke={B.teal} strokeWidth="2" fill="none" strokeLinecap="round" /></svg>

          <rect x="3" y="6" width="26" height="20" rx="3" stroke={B.teal} strokeWidth="1.8" fill="none" />
          <circle cx="11" cy="13" r="2.5" fill={B.teal} opacity="0.5" />
          <path d="M5,23 L12,16 L18,21 L22,18 L27,23" stroke={B.teal} strokeWidth="1.8" fill="none" strokeLinejoin="round" />

        <div style={{ fontFamily: F.main, fontSize: 12.5, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: B.teal, marginBottom: 6 }}>{label}</div>
        <div style={{ fontFamily: F.main, fontSize: 12, lineHeight: 1.5, color: B.soft, maxWidth: 300 }}>{sublabel}</div>
      </div>
    );

    /* ── Header with logo ── */
    const Header = ({ bg }) => (
      <div style={{ background: bg, padding: "24px 20px 0", textAlign: "center" }}>
        <img src={LOGO} alt="BrightKidCo" style={{ height: 34 }} />
      </div>

    /* ── Gradient transition band ── */
    const Band = ({ from, to, height = 40 }) => (
      <div style={{ height, background: `linear-gradient(180deg, ${from} 0%, ${to} 100%)` }} />

    /* ── Part badge (sticker) ── */
    const PartBadge = ({ children }) => (
      <div style={{
        display: "inline-block", background: "#FFD866",
        padding: "7px 14px", borderRadius: 999, fontSize: 10.5,
        fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase",
        marginBottom: 16, border: `2px solid ${B.ink}`, transform: "rotate(-1.5deg)",

      }}>{children}</div>

    /* ── Title block ── */
    const TitleBlock = ({ badge, part1, part2, accent2 = true, subhead }) => (
      <div style={{ padding: "34px 22px 0", textAlign: "center" }}>
        <PartBadge>{badge}</PartBadge>
        <h1 style={{ fontSize: 40, lineHeight: 1, fontWeight: 700, margin: 0, letterSpacing: -0.8 }}>
          {part1}<br/>
          {accent2 ? <span style={{ ...B.gradientText, fontWeight: 700 }}>{part2}</span> : part2}
        </h1>
        {subhead && (
          <p style={{ fontSize: 17, color: B.soft, marginTop: 14, lineHeight: 1.4, fontWeight: 500 }}>{subhead}</p>
        )}
      </div>
    );

    /* ── Section H2 ── */
    const H2 = ({ children, center, size = 28 }) => (
      <h2 style={{ fontSize: size, lineHeight: 1.15, fontWeight: 700, margin: "0 0 16px", letterSpacing: -0.4, textAlign: center ? "center" : "left" }}>{children}</h2>
    );

    /* ── Signoff ── */
    const Signoff = ({ bg = B.ink }) => {
      const s = window.FLOW1_SHARED.signoff;
      return (
        <div style={{ background: bg, padding: "0 22px 36px" }}>
          <div style={{
            position: "relative",
            background: "#1F2A2C",
            border: "1.5px solid #2F3D40",
            borderRadius: 22,
            padding: "26px 24px 24px",
            overflow: "hidden",
          }}>
            {/* subtle top gradient accent */}
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0, height: 4,
              background: B.gradient, opacity: 0.9,
            }} />

            {/* Top row: avatar + name/role */}
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
              {/* Avatar with warm ring */}
              <div style={{
                width: 58, height: 58, flexShrink: 0,
                borderRadius: "50%",
                background: `linear-gradient(135deg, #FFD866 0%, ${B.teal} 100%)`,
                padding: 2.5,
                position: "relative",
              }}>
                <div style={{
                  width: "100%", height: "100%", borderRadius: "50%",
                  background: "#FFFDF6",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  overflow: "hidden",
                  border: `1.5px solid ${B.ink}`,
                }}>
                  <svg width="58" height="58" viewBox="0 0 58 58">
                    <rect width="58" height="58" fill="#F5E8D0" />
                    <circle cx="29" cy="22" r="10" fill="#D4A574" />

              </div>

              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: 10.5, letterSpacing: 1.6, textTransform: "uppercase",
                  color: "#8FAFB2", fontWeight: 700, marginBottom: 2,
                }}>

                <div style={{ fontSize: 17, fontWeight: 700, color: "#FFFFFF", lineHeight: 1.2 }}>
                  Lena Bauer
                </div>
                <div style={{ fontSize: 12, color: "#8FAFB2", marginTop: 2, fontStyle: "italic" }}>
                  Founder · BrightKidCo · Mom of two

            </div>

            {/* Handwritten signature */}
            <div style={{
              display: "flex", alignItems: "center", gap: 14,
              paddingTop: 16, paddingBottom: 16,

              borderBottom: "1.5px dashed #3A4547",
              marginBottom: 16,
            }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12.5, color: "#B8CACD", marginBottom: 2 }}>
                  {s.line1}

                <div style={{
                  fontFamily: "'Caveat', cursive",
                  fontSize: 42,
                  lineHeight: 0.95,
                  fontWeight: 500,
                  color: "#D8F57C",
                  letterSpacing: -0.5,
                  marginTop: 2,
                }}>
                  Lena

              </div>

              {/* flourish SVG */}
              <svg width="54" height="40" viewBox="0 0 54 40" style={{ flexShrink: 0, opacity: 0.55 }}>
                <path d="M2,20 C8,10 16,28 24,18 C30,10 38,26 48,14 L52,10" stroke="#D8F57C" strokeWidth="1.5" fill="none" strokeLinecap="round" />

            </div>

            {/* Personal P.S. */}
            <div style={{
              fontSize: 13, lineHeight: 1.65, color: "#B8CACD",
              fontStyle: "italic",
            }}>
              <span style={{ color: "#D8F57C", fontWeight: 700, fontStyle: "normal", marginRight: 4 }}>
                P.S.
              </span>
              {s.ps.replace(/^P\.S\.\s*/, "")}
            </div>

            {/* Reply line */}
            <div style={{
              fontSize: 13, lineHeight: 1.65, color: "#B8CACD",
              fontStyle: "italic", marginTop: 12,
            }}>
              Questions? Hit reply. You get me, not a bot, not a template. I read everything.
            </div>
          </div>
        </div>
      );
    };

    /* ── Soft "Out" line ── */
    const OutLine = ({ bg = "#FFFFFF" }) => (
      <div style={{ background: bg, padding: "18px 24px 0", textAlign: "center", fontSize: 12.5, color: B.muted, fontStyle: "italic" }}>
        {window.FLOW1_SHARED.out}
      </div>
    );

    /* ── Footer ── */
    const Footer = () => {
      const f = window.FLOW1_SHARED.footer;
      return (
        <div style={{ background: "#FFFFFF", padding: "30px 24px 30px", textAlign: "center" }}>
          <div style={{ fontFamily: F.display, fontSize: 20, fontStyle: "italic", fontWeight: 500, color: B.ink, marginBottom: 30, letterSpacing: -0.2 }}>
            {f.tagline}
          </div>
          {f.links.map((l, i) => (
            <div key={i} style={{ fontSize: 14, color: B.ink, fontWeight: 500, marginBottom: 14 }}>
              <a href="#" style={{ color: B.ink, textDecoration: "none" }}>{l}</a>

            <a href="#"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={B.ink} strokeWidth="1.8"><path d="M9 12a4 4 0 1 0 4 4V4c.5 2.5 2.5 4.5 5 5" strokeLinecap="round" strokeLinejoin="round" /></svg></a>
          </div>
          <div style={{ fontSize: 11.5, color: B.muted, lineHeight: 1.65, margin: "0 auto", maxWidth: 340 }}>
            No longer want to receive these emails? <a href="#" style={{ color: B.ink, textDecoration: "underline" }}>Unsubscribe</a>.<br/>
            <span style={{ fontSize: 11 }}>{f.address}</span>
          </div>
          <div style={{ margin: "28px auto 0", width: 60, height: 3, background: B.gradient, borderRadius: 3 }} />
        </div>
      );
    };

    /* ── Email shell ── */
    const EmailShell = ({ children, preheader, bg }) => (
      <div style={{ width: MW, background: bg, fontFamily: F.main, color: B.ink }}>
        <div style={{ padding: "6px 20px", fontSize: 11, color: B.muted, background: "#F6F2EA", textAlign: "center", fontStyle: "italic" }}>
          Preheader: {preheader}
        </div>
        {children}
      </div>
    );

    /* ═══════ ProductShowcaseFull ═══════ */
    const ProductShowcaseFull = ({ eyebrow, title, titleAccent, sub, priceFrom = "€34", priceNote, features, ctaButton, guaranteeBadge = true }) => {
      const defaultFeatures = features || [
        { icon: "◉", label: "Body-Signal Layer™" },
        { icon: "✓", label: "60-day guarantee" },
        { icon: "♡", label: "Sensory-friendly" },
      ];

      return (
        <div style={{ padding: "28px 14px 20px" }}>
          {/* Intro */}
          <div style={{ textAlign: "center", marginBottom: 18, padding: "0 16px" }}>
            <div style={{ fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color: B.tealDeep, fontWeight: 700, marginBottom: 10 }}>
              {eyebrow || "The product"}
            </div>
            <h2 style={{ fontSize: 28, lineHeight: 1.15, fontWeight: 700, margin: "0 0 16px", letterSpacing: -0.4, textAlign: "center" }}>
              {title}{" "}
              <span style={{ ...B.gradientText, fontWeight: 700 }}>{titleAccent}</span>
            </h2>
            {sub && (
              <p style={{ fontSize: 14, color: B.soft, lineHeight: 1.55, margin: "8px 0 0" }}>{sub}</p>

          </div>

          {/* Main product card */}
          <div style={{
            background: "#FFFFFF",
            border: `2px solid ${B.ink}`,
            borderRadius: 24,
            overflow: "hidden",
            boxShadow: `6px 6px 0 ${B.ink}`,
          }}>
            {/* Hero shot */}
            <div style={{ position: "relative", background: "#FFFDF6" }}>
              <ImgFrame
                height={300}
                radius={0}
                label="PRODUCT · HERO SHOT"
                sublabel="Founders holding Body-Signal Learning pants in yellow and watermelon colors"
              />
              {/* floating guarantee badge */}
              {guaranteeBadge && (
                <div style={{
                  position: "absolute", top: 14, right: 14,
                  background: "#FFD866", border: `2px solid ${B.ink}`,
                  borderRadius: 999, padding: "6px 12px",
                  fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase",
                  transform: "rotate(4deg)", boxShadow: `2px 2px 0 ${B.ink}`,
                  display: "flex", alignItems: "center", gap: 5,
                }}>
                  <span style={{ fontSize: 13 }}>✿</span>
                  <span>60 days calm</span>
                </div>
              )}

            {/* Product info block */}
            <div style={{ padding: "22px 22px 22px", borderTop: `2px solid ${B.ink}` }}>
              {/* name + price row */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 14, marginBottom: 14 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10.5, letterSpacing: 1.5, textTransform: "uppercase", color: B.tealDeep, fontWeight: 700, marginBottom: 4 }}>
                    BrightKidCo
                  </div>
                  <h3 style={{ margin: 0, fontSize: 19, fontWeight: 700, lineHeight: 1.2, color: B.ink }}>
                    Body-Signal Learning<br/>Layer™ Pants

                  <div style={{ fontSize: 10, color: B.muted, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase" }}>From</div>
                  <div style={{ fontSize: 28, fontWeight: 700, color: B.ink, lineHeight: 1, letterSpacing: -0.5 }}>
                    {priceFrom}

                </div>
              </div>

              {/* price note */}
              {priceNote && (
                <div style={{ fontSize: 12.5, color: B.soft, marginBottom: 18, fontStyle: "italic" }}>
                  {priceNote}
                </div>
              )}

              {/* feature pills */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 20 }}>
                {defaultFeatures.map((f, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "center", gap: 6,
                    padding: "7px 12px",
                    background: "#FAF7F0", border: `1.5px solid ${B.ink}`,
                    borderRadius: 999, fontSize: 11.5, fontWeight: 600,
                    color: B.ink,
                  }}>
                    <span style={{ color: B.teal, fontWeight: 700 }}>{f.icon}</span>
                    <span>{f.label}</span>
                  </div>
                ))}
              </div>

              {/* CTA button */}
              <a href="#" style={{
                display: "block",
                padding: "16px 24px",
                background: B.ink,
                color: "#D8F57C",
                fontSize: 15, fontWeight: 700,
                textDecoration: "none", borderRadius: 999,

          {/* 2-up sub row */}

              border: `2px solid ${B.ink}`, borderRadius: 14,
              overflow: "hidden", boxShadow: `3px 3px 0 ${B.ink}`,

              <div style={{ background: `${B.teal}15` }}>
                <ImgFrame height={110} radius={0} label="COLOURWAY 01" sublabel="Sage · soft green" />
              </div>
              <div style={{ padding: "10px 12px", fontSize: 11.5, fontWeight: 700, color: B.ink, textAlign: "center", borderTop: `2px solid ${B.ink}` }}>

            </div>
            <div style={{
              flex: 1, background: "#FFFFFF",
              border: `2px solid ${B.ink}`, borderRadius: 14,
              overflow: "hidden", boxShadow: `3px 3px 0 ${B.ink}`,

              <div style={{ background: `${B.green}15` }}>
                <ImgFrame height={110} radius={0} label="SIZE RANGE" sublabel="2T · 3T · 4T · 5T · 6T" />
              </div>
              <div style={{ padding: "10px 12px", fontSize: 11.5, fontWeight: 700, color: B.ink, textAlign: "center", borderTop: `2px solid ${B.ink}` }}>
                Ages 2–7
              </div>
            </div>
          </div>
        </div>

    };

        {/* ═══════ BAND TRANSITION ═══════ */}

        {/* ═══════ HERO / TITLE BLOCK ═══════ */}
        <TitleBlock
          badge="3/8 — THE SIGNAL"

        {/* ═══════ BODY-SIGNAL WAVE ILLUSTRATION ═══════ */}

        {/* ═══════ THREE-FAMILY HOOK (Pull-Quote Cards) ═══════ */}
        <div style={{ padding: "4px 24px 28px", background: B.paper }}>
          {/* Pull Quote 1 */}
          <div style={{
            background: "#F5F0EB",
            borderLeft: "3px solid #C4B5A5",
            borderRadius: 8,
            padding: "18px 20px",
            marginBottom: 14,
          }}>
            <p style={{
              margin: 0,
              fontFamily: "'Georgia', serif",
              fontSize: 17,
              fontStyle: "italic",
              lineHeight: 1.6,

              fontFamily: "'Georgia', serif",

              color: B.ink,

            </p>

          {/* Pull Quote 3 */}
          <div style={{
            background: "#F0EEF5",
            borderLeft: "3px solid #B8B0CC",
            borderRadius: 8,
            padding: "18px 20px",
            marginBottom: 20,
          }}>
            <p style={{
              margin: 0,
              fontFamily: "'Georgia', serif",
              fontSize: 17,
              fontStyle: "italic",
              lineHeight: 1.6,
              color: B.ink,
            }}>
              "He's never shown a single sign of feeling wet or dirty. Not once in all these years."
            </p>
          </div>

          {/* Body Copy */}
          <p style={{
            margin: 0,
            fontSize: 15,
            lineHeight: 1.7,
            color: B.soft,
          }}>
            If any of these sound familiar, you're not alone. And you're not failing. You're working with a missing piece most potty training methods don't account for.

        {/* ═══════ GRADIENT BAND DIVIDER (20.3) ═══════ */}

          height: 3,
          background: `linear-gradient(90deg, ${B.teal}33 0%, transparent 100%)`,

        {/* ═══════ STAT ROW — 49% Validation (SP-03) ═══════ */}
        <div style={{ background: "#F8F6F0", padding: "32px 22px" }}>
          {/* Large Stat */}
          <div style={{ textAlign: "center", marginBottom: 8 }}>
            <span style={{
