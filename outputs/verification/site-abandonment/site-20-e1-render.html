const Email_site_20_e1 = () => (

      </p>

        You didn't fail. The methods did.

    {/* EDU-8: Mechanism Diagram */}
    <div style={{ background: B.cream, border: `2px solid ${B.teal}`, borderRadius: 14, padding: "28px 22px", margin: "36px 22px" }}>
      <div style={{ fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color: B.teal, fontWeight: 700, marginBottom: 10, fontFamily: F.main }}>THE SIGNAL GAP</div>
      <p style={{ margin: "0 0 14px", fontSize: 15, color: B.soft, lineHeight: 1.7, fontFamily: F.main }}>

      </p>
      <p style={{ margin: "0 0 14px", fontSize: 15, color: B.soft, lineHeight: 1.7, fontFamily: F.main }}>

      </p>

      <p style={{ margin: "0 0 14px", fontSize: 15, color: B.soft, lineHeight: 1.7, fontFamily: F.main }}>

      </p>
      <p style={{ margin: 0, fontSize: 15, fontWeight: 600, color: B.ink, lineHeight: 1.7, fontFamily: F.main }}>

        <div style={{ fontFamily: F.main, fontSize: 12, fontWeight: 500, fontStyle: "italic", color: B.muted, marginBottom: 8 }}>Lena, mom of a verbal 4-year-old:</div>
        <div style={{ fontFamily: F.display, fontSize: 16, fontWeight: 400, fontStyle: "italic", color: B.ink, lineHeight: 1.6, borderLeft: "3px solid #E8DED5", paddingLeft: 14 }}>
