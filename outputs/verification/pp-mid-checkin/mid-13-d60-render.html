const FramedImage = ({ children, height, label, sublabel, shadow = 4 }) => (

const Band = ({ from, to, height = 40 }) => (

const Header = ({ bg }) => (
  <div style={{ background: bg, padding: "24px 20px 0", textAlign: "center" }}>

);

const PartBadge = ({ children }) => (

    marginBottom: 16, border: `2px solid ${B.ink}`, transform: "rotate(-1.5deg)",

  }}>{children}</div>
);

const TitleBlock = ({ badge, part1, part2, accent2 = true, subhead }) => (

const Letter = ({ bg, paras, first }) => (

      <p key={i} style={{ margin: i === paras.length - 1 ? 0 : "0 0 14px" }}>{p}</p>
    ))}

);

const Eyebrow = ({ children, color = B.tealDeep }) => (
  <div style={{ fontSize: 10.5, letterSpacing: 2, textTransform: "uppercase", color, fontWeight: 700, marginBottom: 10 }}>{children}</div>
);

const H2 = ({ children, center, size = 28 }) => (

);

const CTAClose = ({ intro, button, fine, bg = B.ink }) => (
  <div style={{ background: bg, padding: "20px 22px 44px", textAlign: "center", color: "#FFF" }}>
    <p style={{ fontSize: 14, lineHeight: 1.6, color: "#B8CACD", margin: "0 0 24px" }}>{intro}</p>
    <a href="#" style={{
      display: "inline-block", padding: "17px 32px",
      background: "#D8F57C", color: B.ink, fontSize: 15.5, fontWeight: 700,
      textDecoration: "none", borderRadius: 999, letterSpacing: 0.3,
    }}>{button} →</a>
    {fine && <div style={{ marginTop: 16, fontSize: 11.5, color: "#8A9B9D" }}>{fine}</div>}
  </div>
);

const Signoff = ({ bg = B.ink }) => {
  const s = window.FLOW1_SHARED.signoff;
  return (
    <div style={{ background: bg, padding: "0 22px 36px" }}>
      <div style={{
        position: "relative",
        background: "#1F2A2C",
        border: "1.5px solid #2F3D40",
        borderRadius: 22,
        padding: "26px 24px 24px",
        overflow: "hidden",
      }}>
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, height: 4,
          background: B.gradient, opacity: 0.9,
        }} />
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
          <div style={{
            width: 58, height: 58, flexShrink: 0,
            borderRadius: "50%",
            background: `linear-gradient(135deg, #FFD866 0%, ${B.teal} 100%)`,
            padding: 2.5,
            position: "relative",
          }}>
            <div style={{
              width: "100%", height: "100%", borderRadius: "50%",
              background: "#FFFDF6",
              display: "flex", alignItems: "center", justifyContent: "center",
              overflow: "hidden",
              border: `1.5px solid ${B.ink}`,
            }}>
              <svg width="58" height="58" viewBox="0 0 58 58">
                <rect width="58" height="58" fill="#F5E8D0" />
                <circle cx="29" cy="22" r="10" fill="#D4A574" />
                <path d="M10,58 C10,42 18,34 29,34 C40,34 48,42 48,58 Z" fill="#C98C6B" />
                <text x="29" y="55" textAnchor="middle" fontSize="6" fill={B.ink} fontWeight="700" letterSpacing="0.5" opacity="0.4">PHOTO</text>
              </svg>
            </div>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              fontSize: 10.5, letterSpacing: 1.6, textTransform: "uppercase",
              color: "#8FAFB2", fontWeight: 700, marginBottom: 2,
            }}>A note from</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#FFFFFF", lineHeight: 1.2 }}>Lena Bauer</div>
            <div style={{ fontSize: 12, color: "#8FAFB2", marginTop: 2, fontStyle: "italic" }}>Founder · BrightKidCo · Mom of two</div>
          </div>
        </div>
        <div style={{
          display: "flex", alignItems: "center", gap: 14,
          paddingTop: 16, paddingBottom: 16,
          borderTop: "1.5px dashed #3A4547",
          borderBottom: "1.5px dashed #3A4547",
          marginBottom: 16,
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12.5, color: "#B8CACD", marginBottom: 2 }}>{s.line1}</div>
            <div style={{
              fontFamily: "'Caveat', cursive",
              fontSize: 42, lineHeight: 0.95, fontWeight: 500,
              color: "#D8F57C", letterSpacing: -0.5, marginTop: 2,
            }}>Lena</div>
          </div>
          <svg width="54" height="40" viewBox="0 0 54 40" style={{ flexShrink: 0, opacity: 0.55 }}>
            <path d="M2,20 C8,10 16,28 24,18 C30,10 38,26 48,14 L52,10" stroke="#D8F57C" strokeWidth="1.5" fill="none" strokeLinecap="round" />
            <path d="M48,12 L52,10 L50,14" stroke="#D8F57C" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </div>
        <div style={{ fontSize: 13, lineHeight: 1.65, color: "#B8CACD", fontStyle: "italic" }}>
          <span style={{ color: "#D8F57C", fontWeight: 700, fontStyle: "normal", marginRight: 4 }}>P.S.</span>
          {s.ps.replace(/^P\.S\.\s*/, "")}
        </div>
      </div>
    </div>
  );
};

const OutLine = ({ bg = "#FFFFFF" }) => (
  <div style={{ background: bg, padding: "18px 24px 0", textAlign: "center", fontSize: 12.5, color: B.muted, fontStyle: "italic" }}>
    {window.FLOW1_SHARED.out}
  </div>
);

const Footer = () => {
  const f = window.FLOW1_SHARED.footer;
  return (
    <div style={{ background: "#FFFFFF", padding: "30px 24px 30px", textAlign: "center" }}>
      <div style={{ fontFamily: F.display, fontSize: 20, fontStyle: "italic", fontWeight: 500, color: B.ink, marginBottom: 30, letterSpacing: -0.2 }}>
        {f.tagline}
      </div>
      {f.links.map((l, i) => (
        <div key={i} style={{ fontSize: 14, color: B.ink, fontWeight: 500, marginBottom: 14 }}>
          <a href="#" style={{ color: B.ink, textDecoration: "none" }}>{l}</a>
        </div>
      ))}
      <div style={{ display: "flex", justifyContent: "center", gap: 22, margin: "14px 0 28px" }}>
        <a href="#"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={B.ink} strokeWidth="1.8"><rect x="3" y="3" width="18" height="18" rx="5" /><circle cx="12" cy="12" r="4" /><circle cx="17.5" cy="6.5" r="0.8" fill={B.ink} stroke="none" /></svg></a>
        <a href="#"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={B.ink} strokeWidth="1.8"><path d="M16 3h-3a5 5 0 0 0-5 5v3H5v4h3v8h4v-8h3l1-4h-4V8a1 1 0 0 1 1-1h3z" strokeLinejoin="round" /></svg></a>
        <a href="#"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={B.ink} strokeWidth="1.8"><path d="M9 12a4 4 0 1 0 4 4V4c.5 2.5 2.5 4.5 5 5" strokeLinecap="round" strokeLinejoin="round" /></svg></a>
      </div>
      <div style={{ fontSize: 11.5, color: B.muted, lineHeight: 1.65, margin: "0 auto", maxWidth: 340 }}>
        No longer want to receive these emails? <a href="#" style={{ color: B.ink, textDecoration: "underline" }}>Unsubscribe</a>.<br/>
        <span style={{ fontSize: 11 }}>{f.address}</span>
      </div>
      <div style={{ margin: "28px auto 0", width: 60, height: 3, background: B.gradient, borderRadius: 3 }} />
    </div>
  );
};

const EmailShell = ({ children, preheader, bg }) => (
  <div style={{ width: MW, background: bg, fontFamily: F.main, color: B.ink }}>
    <div style={{ padding: "6px 20px", fontSize: 11, color: B.muted, background: "#F6F2EA", textAlign: "center", fontStyle: "italic" }}>
      Preheader: {preheader}
    </div>
    {children}
  </div>
);

window.B = B;
window.F = F;
window.MW = MW;
window.LOGO = LOGO;
window.ImgFrame = ImgFrame;
window.FramedImage = FramedImage;
window.Band = Band;
window.Header = Header;
window.PartBadge = PartBadge;
window.TitleBlock = TitleBlock;
window.Letter = Letter;
window.Eyebrow = Eyebrow;
window.H2 = H2;
window.CTAClose = CTAClose;
window.Signoff = Signoff;
window.OutLine = OutLine;
window.Footer = Footer;
window.EmailShell = EmailShell;
</script>

<!-- Email JSX (mid-13-d60) -->
<script type="text/babel" data-type="module">
const Email_pp_mid_checkin_13_d60 = () => (
  <EmailShell preheader="Whether your child is showing clear signs or still building awareness, both belong here." bg="#FBF7F1">

    {/* SECTION 1: HEADER */}
    <div style={{ background: "#FFFFFF", padding: "28px 24px 18px", textAlign: "center", borderBottom: "1px solid #E6E2DC" }}>
      <img src="../assets/brightkidco-logo-v2.png" alt="BrightKidCo" style={{ height: 34 }} />
    </div>

    {/* SECTION 2: HERO */}
    <div style={{ background: "#FBF7F1", padding: "48px 24px 40px" }}>
      <div style={{ fontFamily: F.main, fontSize: 10.5, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#2BAEB4", marginBottom: 20, textAlign: "center" }}>
        DAY 60 CHECK-IN
      </div>
      <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 600, lineHeight: 1.3, color: "#1F2D2F", margin: "0 0 24px", textAlign: "center" }}>
        60 days. Where are you?
      </h1>
      <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 14px" }}>
        60 days. That's two months of consistent wear, consistent signals, consistent learning.
      </p>
      <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 14px" }}>
        Whether your child is starting to pause before an accident, or you're still waiting for the first sign of awareness, both are real outcomes. Both belong in this conversation.
      </p>
      <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 14px" }}>
        Because the nervous system doesn't follow a calendar. Some kids show first signals at 2 weeks. Others need 8 to 12 weeks. Some are building awareness quietly, in ways that don't look like "progress" on a chart but are real steps inside the brain.
      </p>
      <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: 0 }}>
        Wherever you are right now, that's where this email meets you.
      </p>

      {/* Signal-Strength Indicator */}
      <div style={{ marginTop: 32, padding: "20px 0" }}>
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 0 }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#2BAEB4" }} />
            <div style={{ fontFamily: F.main, fontSize: 10, color: "#8A9B9D", marginTop: 6, textAlign: "center", whiteSpace: "nowrap" }}>Just Beginning</div>
          </div>
          <div style={{ width: 60, height: 1, background: "#8A9B9D", margin: "0 6px", marginBottom: 18 }} />
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#2BAEB4" }} />
            <div style={{ fontFamily: F.main, fontSize: 10, color: "#8A9B9D", marginTop: 6, textAlign: "center", whiteSpace: "nowrap" }}>Building</div>
          </div>
          <div style={{ width: 60, height: 1, background: "#8A9B9D", margin: "0 6px", marginBottom: 18 }} />
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", border: "2px solid #5DD07A", background: "#FFFFFF" }} />
            <div style={{ fontFamily: F.main, fontSize: 10, color: "#8A9B9D", marginTop: 6, textAlign: "center", whiteSpace: "nowrap" }}>Signaling</div>
          </div>
        </div>
      </div>
    </div>

    {/* SECTION 3: Dot Pattern */}
    <div style={{ background: "#FBF7F1", padding: "8px 24px", textAlign: "center" }}>
      <div style={{ display: "flex", justifyContent: "center", gap: 8 }}>
        {[0,1,2,3,4].map(i => (
          <div key={i} style={{ width: 2, height: 2, borderRadius: "50%", background: "#8A9B9D" }} />
        ))}
      </div>
    </div>

    {/* SECTION 4: Three-Path Validation */}
    <div style={{ background: "#FFFFFF", padding: "48px 24px" }}>
      <p style={{ fontFamily: F.main, fontSize: 18, fontWeight: 600, color: "#1F2D2F", margin: "0 0 24px", lineHeight: 1.4 }}>
        Let me name what might be true for you:
      </p>
      {/* PATH 1 */}
      <div style={{ background: "#FBF7F1", borderRadius: 12, padding: 20, marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 12 }}>
          <div style={{ flexShrink: 0, marginTop: 2 }}>
            <svg width="16" height="16" viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="8" fill="#5DD07A" />
              <path d="M4.5 8L7 10.5L11.5 5.5" stroke="#FFFFFF" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>
          <div>
            <p style={{ fontFamily: F.main, fontSize: 14, fontWeight: 700, color: "#1F2D2F", margin: 0 }}>If you're seeing progress:</p>
          </div>
        </div>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 12px" }}>
          Your child pauses before peeing. Or pulls at their pants when wet. Or walked toward the bathroom, even after the accident. That's the body signal wiring.
        </p>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 12px" }}>
          The brain is learning: "This feeling means something. I should do something about it."
        </p>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: 0 }}>
          Keep going. Growing awareness leads to longer dry periods. Some kids start initiating, showing you, telling you, or leading you to the bathroom. That's the next phase.
        </p>
      </div>

      {/* PATH 2 */}
      <div style={{ background: "#FBF7F1", borderRadius: 12, padding: 20, marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 12 }}>
          <div>
            <p style={{ fontFamily: F.main, fontSize: 14, fontWeight: 700, color: "#1F2D2F", margin: 0 }}>If you're not seeing what you hoped:</p>
          </div>
        </div>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 12px", fontStyle: "italic" }}>
          That's not failure. That's neurology.
        </p>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 12px" }}>
          Every nervous system has its own pace. Some children need more time for the body-signal feedback loop to register.
        </p>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: 0 }}>
          The 60-day window exists because we know timelines vary. If your child is slow to pick up signals, doesn't seem to feel wet or dry, they may need more sustained exposure. The neural pathways are still forming even when there's no visible sign.
        </p>
      </div>

      {/* PATH 3 */}
      <div style={{ background: "#FBF7F1", borderRadius: 12, padding: 20 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 12 }}>
          <div>
            <p style={{ fontFamily: F.main, fontSize: 14, fontWeight: 700, color: "#1F2D2F", margin: 0 }}>If you're somewhere in between, mini-wins mixed with setbacks:</p>
          </div>
        </div>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: "0 0 14px" }}>
          That's the most common path. Progress isn't a straight line. It looks more like:
        </p>
        <div style={{ borderLeft: "2px solid #8A9B9D", paddingLeft: 16, marginBottom: 14 }}>
          <p style={{ fontFamily: F.display, fontSize: 16, fontWeight: 400, fontStyle: "italic", lineHeight: 1.5, color: "#1F2D2F", margin: 0 }}>
            "Two steps forward, one step back, a plateau, then another step."
          </p>
        </div>
        <p style={{ fontFamily: F.main, fontSize: 15, fontWeight: 400, lineHeight: 1.6, color: "#4A6568", margin: 0 }}>
          Regression after progress isn't starting over. The pathways you built are still there. The nervous system is recalibrating.
        </p>
      </div>
    </div>

    {/* SECTION 5: Recognition Anchors */}
    <div style={{ background: "#FFFFFF", padding: "48px 24px" }}>
      <p style={{ fontFamily: F.main, fontSize: 18, fontWeight: 600, color: "#1F2D2F", margin: "0 0 20px", lineHeight: 1.4 }}>
        You've probably seen some version of one of these by now:
