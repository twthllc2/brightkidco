<!doctype html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  html, body { margin: 0; padding: 0; background: #F5F1EA; font-family: 'Inter', system-ui, sans-serif; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="email-1.jsx"></script>

<script type="text/babel">
  const App = () => (
    <DesignCanvas title="Welcome Flow · Autistic Parent" subtitle="Email 1 of 4 — hi-fi">
      <DCSection id="intro" title="Reading context">
        <DCArtboard id="brief" label="Brief + tone" width={560} height={640} background="#FFFFFF">
          <div style={{ padding: 42, fontFamily: "'Inter', system-ui, sans-serif", color: "#2D3B3D", lineHeight: 1.6 }}>
            <div style={{
              display: "inline-block",
              padding: "6px 12px",
              background: "#E8F5EC",
              color: "#2E9E56",
              borderRadius: 999,
              fontSize: 11,
              letterSpacing: 1.5,
              textTransform: "uppercase",
              fontWeight: 700,
              marginBottom: 18,
            }}>
              Avatar · Autistic Parent
            </div>
            <h1 style={{ fontFamily: "'Fraunces', Georgia, serif", fontSize: 34, margin: "0 0 14px", fontWeight: 500, letterSpacing: -0.5, lineHeight: 1.1 }}>
              Email 1 of 4<br/>You're not failing.
            </h1>
            <p style={{ fontSize: 14.5, margin: "0 0 22px", color: "#566668" }}>
              The opening letter. Quiet, slow, validating. Reframes the problem away from motivation and toward body-signal. No urgency, no caps, no hype.
            </p>

            <div style={{ display: "grid", gap: 14 }}>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: "#2BAEB4", fontWeight: 700, marginBottom: 6 }}>Goal</div>
                <div style={{ fontSize: 14 }}>Reduce shame. Introduce the reframe. No pushing.</div>
              </div>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: "#2BAEB4", fontWeight: 700, marginBottom: 6 }}>Covers</div>
                <div style={{ fontSize: 14 }}>You're not failing · Many families need a different path · Sensory-friendly support</div>
              </div>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: "#2BAEB4", fontWeight: 700, marginBottom: 6 }}>Tone</div>
                <div style={{ fontSize: 14 }}>Letter-like. Serif headlines (Fraunces). No emoji. CTA is a door, not a push.</div>
              </div>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: "#2BAEB4", fontWeight: 700, marginBottom: 6 }}>Design DNA</div>
                <div style={{ fontSize: 14 }}>Wonderbly pastel + Begin Health color-accent + BREZ soft premium. Rounded, warm, kid-brand-adjacent without being cartoon.</div>
              </div>
              <div>
                <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: "uppercase", color: "#2BAEB4", fontWeight: 700, marginBottom: 6 }}>Up next in flow</div>
                <div style={{ fontSize: 14, color: "#8A9B9D" }}>E2 · Mechanism explained → E3 · Parent stories → E4 · Soft product intro</div>
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="email-1" title="Email 1 · You're not failing">
        <DCArtboard id="hifi" label="Hi-Fi · full email" width={640} height={2480} background="#FFFFFF">
          <div style={{ padding: "20px 20px 60px", background: "#F5F1EA" }}>
            <Email1 />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
