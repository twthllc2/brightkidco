<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome · GF · BrightKidCo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Caveat:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>

    #root { width: 100vw; min-height: 100vh; }

  </style>

  <!-- React 18 + Babel (pinned) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

<body>
  <div id="root" data-screen-label="Welcome GF Canvas"></div>

  <!-- 1. tokens.js (brand) -->
  <script src="../autistic-welcome/variants/tokens.js"></script>
  <!-- 2. content.js (per-flow data) -->
  <script src="./content.js"></script>
  <!-- 3. design-canvas.jsx (shared) -->
  <script type="text/babel" src="../welcome-flow/design-canvas.jsx"></script>
  <!-- 4. primitives.jsx (shared) -->
  <script type="text/babel" src="../welcome-flow/primitives.jsx"></script>
  <!-- 5. product-showcase.jsx (shared) -->
  <script type="text/babel" src="../welcome-flow/product-showcase.jsx"></script>
  <!-- 6. illustrations.jsx (shared) -->
  <script type="text/babel" src="../autistic-welcome/variants/illustrations.jsx"></script>
  <!-- 7. emails.jsx (per-flow) -->
  <script type="text/babel" src="./emails.jsx"></script>
  <!-- 8. app.jsx (mount) -->
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
