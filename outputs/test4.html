<!DOCTYPE html>
<html>
<head><title>Test4</title></head>
<body>
<div id="root"></div>
<div id="err" style="color:red;padding:20px;font-family:monospace;white-space:pre-wrap"></div>
<script>
window._errors = [];
window.onerror = function(msg, url, line, col, error) {
  window._errors.push(msg + " at " + url + ":" + line);
  document.getElementById("err").textContent = window._errors.join("\n");
};
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="http://localhost:8888/cart-e1.transpiled.js"></script>
<script>
var info = "CartE1: " + typeof CartE1 + ", BRAND: " + typeof window.BRAND + ", errors: " + window._errors.length;
document.getElementById("err").textContent = info;
if (typeof CartE1 !== "undefined") {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(CartE1));
  document.getElementById("err").textContent += " | root: " + document.getElementById("root").innerHTML.length;
}
</script>
</body>
</html>
