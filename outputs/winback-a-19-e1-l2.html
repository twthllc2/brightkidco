    interoception: `Interoception researcher Kelly Mahler calls it the "eighth sensory system", the sense that tells us when we're hungry, thirsty, or need the bathroom. For many autistic children, this sense works differently. The signal from the bladder travels up the vagus nerve, but the brain doesn't register it in time.`,

    citation: "An 8-week study by Hample, Mahler & Amspacher (2020) confirmed that autistic children's body awareness significantly improved with structured practice over time, not in days, but in weeks.",
    testimonial: `The first time we tried, he wore them for maybe 3 days. He had more accidents in those 3 days than the past month in pull-ups. I thought, this is worse. We stopped. Three months later I tried again, but this time I committed to 2 hours a day, every day, for 4 weeks. Week 3: he paused. He was mid-play and he just stopped and looked down. He didn't say anything. But he felt it. That had never happened in 5 years. Week 6: he walked to the bathroom on his own for the first time. Not consistently. But once. And once is the first time anything has changed since his BCBA started scheduled sits. Her BCBA noticed the shift too, said the sensory piece was "filling in a gap the behavioral protocol couldn't reach." We're not trained. But we're not where we were.`,

    timeline2Body: "Small awareness signals may appear: a pause, a look down, a tug at the waistband. These are micro-wins. For some kids, they show up at week 2. For others, week 8. Both are normal.",
