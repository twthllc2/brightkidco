<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EAF6F2"/>
      <stop offset="100%" stop-color="#D4F0E4"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="100%" stop-color="#FFF6E2"/>
    </linearGradient>
  </defs>
  <!-- Warm background -->
  <rect width="420" height="240" fill="url(#warmGrad)" rx="0"/>
  <!-- Soft hills -->
  <ellipse cx="210" cy="260" rx="280" ry="80" fill="#EAF6F2" opacity="0.6"/>
  <ellipse cx="100" cy="270" rx="200" ry="70" fill="#D4F0E4" opacity="0.4"/>
  <!-- Parent figure (simplified, warm) -->
  <circle cx="160" cy="100" r="22" fill="#2BAEB4"/>
  <path d="M130,200 C130,150 145,130 160,130 C175,130 190,150 190,200" fill="#2BAEB4"/>
  <!-- Child figure (smaller, playful) -->
  <circle cx="240" cy="120" r="16" fill="#5DD07A"/>
  <path d="M218,200 C218,165 228,150 240,150 C252,150 262,165 262,200" fill="#5DD07A"/>
  <!-- Hands reaching (connection) -->
  <path d="M182,155 Q200,140 218,148" stroke="#FFD866" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Floating elements (playful) -->
  <circle cx="80" cy="60" r="8" fill="#FFD866" opacity="0.5"/>
  <circle cx="340" cy="50" r="6" fill="#FFB5A0" opacity="0.5"/>
  <circle cx="300" cy="90" r="10" fill="#2BAEB4" opacity="0.3"/>
  <rect x="320" y="140" width="12" height="12" rx="3" fill="#5DD07A" opacity="0.4" transform="rotate(15 326 146)"/>
  <!-- Ground line -->
  <path d="M0,200 Q105,190 210,200 Q315,210 420,200" stroke="#2BAEB4" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Subtle brand accent -->
  <rect x="0" y="236" width="420" height="4" fill="url(#skyGrad)" opacity="0.5"/>
</svg>