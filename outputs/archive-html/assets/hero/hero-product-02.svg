<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <rect width="420" height="240" fill="#F0EDF8"/>
  <!-- Multiple product variants (colorways) -->
  <g transform="translate(60,40)">
    <!-- Variant 1: Teal -->
    <rect x="0" y="30" width="80" height="110" rx="14" fill="#2BAEB4" opacity="0.8"/>
    <rect x="10" y="45" width="60" height="8" rx="4" fill="#5DD07A"/>
    <rect x="20" y="70" width="40" height="3" rx="1.5" fill="#FFF" opacity="0.4"/>
    <text x="40" y="100" text-anchor="middle" font-family="'Questrial'" font-size="9" fill="#FFF" font-weight="600">TEAL</text>
  </g>
  <g transform="translate(170,40)">
    <!-- Variant 2: Green -->
    <rect x="0" y="30" width="80" height="110" rx="14" fill="#5DD07A" opacity="0.8"/>
    <rect x="10" y="45" width="60" height="8" rx="4" fill="#3BB35E"/>
    <rect x="20" y="70" width="40" height="3" rx="1.5" fill="#FFF" opacity="0.4"/>
    <text x="40" y="100" text-anchor="middle" font-family="'Questrial'" font-size="9" fill="#FFF" font-weight="600">GREEN</text>
  </g>
  <g transform="translate(280,40)">
    <!-- Variant 3: Dark -->
    <rect x="0" y="30" width="80" height="110" rx="14" fill="#1F2D2F" opacity="0.8"/>
    <rect x="10" y="45" width="60" height="8" rx="4" fill="#FFD866"/>
    <rect x="20" y="70" width="40" height="3" rx="1.5" fill="#FFF" opacity="0.3"/>
    <text x="40" y="100" text-anchor="middle" font-family="'Questrial'" font-size="9" fill="#FFF" font-weight="600">DARK</text>
  </g>
  <!-- Size range indicator -->
  <text x="210" y="210" text-anchor="middle" font-family="'Questrial'" font-size="11" fill="#4A6568" letter-spacing="2">SIZES 2T - 8 · UNISEX</text>
</svg>