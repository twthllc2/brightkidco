<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240">
  <defs>
    <linearGradient id="handsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF6E2"/><stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
  </defs>
  <rect width="420" height="240" fill="url(#handsBg)"/>
  <!-- Adult hand (left, larger) -->
  <path d="M80,200 Q90,140 120,110 Q140,90 160,100 L170,130 Q165,145 155,150 L140,200 Z" fill="#FFB5A0" opacity="0.7"/>
  <path d="M120,110 Q135,80 145,95" stroke="#FFB5A0" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M135,105 Q148,75 155,90" stroke="#FFB5A0" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M148,108 Q158,82 162,95" stroke="#FFB5A0" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Child hand (right, smaller) -->
  <path d="M340,200 Q330,160 310,140 Q295,128 280,135 L275,155 Q280,165 290,168 L305,200 Z" fill="#FFD866" opacity="0.7"/>
  <path d="M310,140 Q300,120 295,130" stroke="#FFD866" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M300,138 Q292,118 288,128" stroke="#FFD866" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Connection heart/dots between hands -->
  <circle cx="210" cy="130" r="12" fill="#2BAEB4" opacity="0.2"/>
  <circle cx="210" cy="130" r="6" fill="#5DD07A" opacity="0.4"/>
  <circle cx="195" cy="115" r="3" fill="#FFD866" opacity="0.5"/>
  <circle cx="225" cy="115" r="3" fill="#FFD866" opacity="0.5"/>
  <!-- Soft background elements -->
  <circle cx="60" cy="40" r="15" fill="#2BAEB4" opacity="0.08"/>
  <circle cx="360" cy="35" r="12" fill="#5DD07A" opacity="0.1"/>
</svg>