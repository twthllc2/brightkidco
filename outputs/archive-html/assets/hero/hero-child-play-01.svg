      <stop offset="0%" stop-color="#FFF6E2"/><stop offset="100%" stop-color="#FFFBF0"/>
    </linearGradient>
  </defs>
  <rect width="420" height="240" fill="url(#playBg)"/>
  <!-- Floor/play area -->
