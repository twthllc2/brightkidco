  <rect x="145" y="170" width="14" height="14" rx="3" fill="#2BAEB4" opacity="0.6" transform="rotate(-5 152 177)"/>
  <rect x="260" y="168" width="16" height="16" rx="3" fill="#FFB5A0" opacity="0.6" transform="rotate(12 268 176)"/>
  <rect x="280" y="172" width="12" height="12" rx="3" fill="#5DD07A" opacity="0.5" transform="rotate(-8 286 178)"/>
