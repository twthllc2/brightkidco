  var emailData = {
    preheader: "A systematic review of 49 studies confirms what you have sensed all along.",
    hook: "He looked down at the wet spot for the first time in 9 years.",
    hookSub: "You are not expecting a miracle. You stopped expecting miracles years ago. But that moment, a pause, a look, a single step toward the bathroom, that is not an overnight change. That is a nervous system finally receiving a signal it never got before.",
    hookPunch: "It took 9 years for one child's brain to register: something happened.",
    validationHead: "You haven't failed. You've been fighting the wrong problem.",
    validationBody: "Every method you tried, and you've tried them all, assumed your child could feel when they needed to go. Sticker charts. Timer sits. Social stories. Forty hours of ABA a week. A 2500 private consultant. You did everything the experts told you, and nothing changed.",

    validationExplain: "The signal from bladder to brain doesn't arrive the way traditional methods assume it does. It's not behavioral. It's neurological. It's interoception, the eighth sensory system, and for a deeply nervous system that picks up signals slowly, that signal is delayed or absent.",
    mechanismHead1: "49 studies.",
    mechanismHead2: "One clear finding.",
    mechanismBody: "Interoceptive differences in autism are real, measurable, and well-established. The Body-Signal Learning Layer gives their brain the information it's been missing:",
    layer1Name: "Layer 1, Inner Body-Signal Layer.",
    layer1Desc: 'Soft 100% cotton creates a gentle sensation that lasts, an "uh-oh" feeling that lasts 30-60 seconds. Long enough for the brain to register: something happened.',
    layer2Name: "Layer 2, Smart Absorption Core.",
    layer2Desc: "Protects furniture and clothing without wicking the signal away. Unlike pull-ups, which keep your child completely dry and therefore completely unaware.",
    layer3Name: "Layer 3, Protective Outer Barrier.",
    layer3Desc: "Leak-resistant, not leak-proof. The small signal that reaches the outer layer is part of the feedback loop.",
    mechanismClosing: "The mechanism is one-step biology: feedback creates awareness. Awareness creates the possibility of action.",
    testimonial1: "He looked down at the wet spot for the first time in 9 years. That pause, that was more than we'd seen in his entire life.",
    testimonial2: "He has 30 words. 'Bathroom' isn't one of them. After 6 weeks in the Body-Signal underwear, he started pulling at his pants when he'd had an accident. He couldn't tell me. But he showed me.",
    testimonialClosing: `These are not success stories in the way other brands define success. There's no confetti. No graduation certificate. No "fully trained in 3 days." These are micro-wins, a pause, a touch, a look. And for mothers who have spent years seeing nothing, those micro-wins are everything.`,
